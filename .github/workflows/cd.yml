name: Deploy

on: 
  push:
    branches:
      - "main"

jobs:
  redeploy:
    name: Deploying Everything
    runs-on: ubuntu-latest

    steps:
      - name: Deploy via SSH
        run: |
          echo "🔐 Creating SSH key..."
          printf "%s" "${{ secrets.AWS_FREE }}" > key.pem
          chmod 600 key.pem
          ls -l key.pem

          echo "🌐 Connecting to server..."
          ssh -o StrictHostKeyChecking=no -i key.pem ubuntu@${{ secrets.SERVER_IP }} << 'EOF'
            
            echo "🚀 Connected to VM"

            echo "📁 Moving to project directory..."
            cd /home/ubuntu/DevOps-Practice || { echo "❌ Failed to cd"; exit 1; }

            echo "📥 Syncing latest code..."
            git fetch origin
            git reset --hard origin/main || { echo "❌ Git sync failed"; exit 1; }

            echo "🟢 Loading Node version..."
            export NVM_DIR="$HOME/.nvm"
            [ -s "$NVM_DIR/nvm.sh" ] && \. "$NVM_DIR/nvm.sh"
            nvm use v22.22.1 || { echo "❌ NVM failed"; exit 1; }

            echo "📦 Installing dependencies..."
            pnpm install || { echo "❌ pnpm install failed"; exit 1; }

            echo "🏗️ Building project..."
            pnpm run build || { echo "❌ Build failed"; exit 1; }

            echo "♻️ Restarting PM2 services..."
            pm2 reload all || { echo "❌ PM2 reload failed"; exit 1; }

            echo "💾 Saving PM2 state..."
            pm2 save

            echo "✅ Deployment finished successfully!"
          EOF